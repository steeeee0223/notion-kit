name: CI

on:
  pull_request:
    branches: ["*", "feat/*"]
  push:
    branches: ["main", "feat/*"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# You can leverage Vercel Remote Caching with Turbo to speed up your builds
# @link https://turborepo.org/docs/core-concepts/remote-caching#remote-caching-on-vercel-builds
env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./tooling/github/setup
        with:
          base: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.before || github.event.pull_request.base.sha || github.event.merge_group.base_sha || 'origin/main' }}
          head: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Build
        run: pnpm build:packages

      - name: Lint
        run: pnpm lint:ws && pnpm lint:affected

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./tooling/github/setup
        with:
          base: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.before || github.event.pull_request.base.sha || github.event.merge_group.base_sha || 'origin/main' }}
          head: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}

      - name: Format
        run: pnpm format:affected

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./tooling/github/setup
        with:
          base: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.before || github.event.pull_request.base.sha || github.event.merge_group.base_sha || 'origin/main' }}
          head: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}

      - name: Build
        run: pnpm build:packages

      - name: Typecheck
        run: pnpm typecheck:affected

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/github/setup

      - name: Build
        run: pnpm build:packages

      - name: Test
        run: pnpm test
